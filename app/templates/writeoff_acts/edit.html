{% extends "base.html" %}
{% block content %}
<h2>Редактировать акт списания #{{ act.id }}</h2>

<form method="post">
    <!-- Основные поля -->
    <div>
        <label for="organization_id">Организация:</label>
        <select id="organization_id" name="organization_id" required>
            {% for org in orgs %}
            <option value="{{ org.id }}" {% if org.id == act.organization_id %}selected{% endif %}>
                {{ org.name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label for="act_number">Номер акта:</label>
        <input type="text" id="act_number" name="act_number" value="{{ act.act_number }}" required>
    </div>

    <div>
        <label for="act_date">Дата акта:</label>
        <input type="date" id="act_date" name="act_date" value="{{ act.act_date }}" required>
    </div>


    <!-- Комиссия -->
    <div>
        <label for="commission_chairman_id">Председатель комиссии:</label>
        <select id="commission_chairman_id" name="commission_chairman_id" required>
            {% for emp in emps %}
            <option value="{{ emp.id }}" {% if emp.id == act.commission_chairman_id %}selected{% endif %}>
                {{ emp.last_name }} {{ emp.first_name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label for="commission_member1_id">Член комиссии 1:</label>
        <select id="commission_member1_id" name="commission_member1_id" required>
            {% for emp in emps %}
            <option value="{{ emp.id }}" {% if emp.id == act.commission_member1_id %}selected{% endif %}>
                {{ emp.last_name }} {{ emp.first_name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label for="commission_member2_id">Член комиссии 2 (опционально):</label>
        <select id="commission_member2_id" name="commission_member2_id">
            <option value="">-- Не выбрано --</option>
            {% for emp in emps %}
            <option value="{{ emp.id }}" {% if emp.id == act.commission_member2_id %}selected{% endif %}>
                {{ emp.last_name }} {{ emp.first_name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label for="commission_member3_id">Член комиссии 3 (опционально):</label>
        <select id="commission_member3_id" name="commission_member3_id">
            <option value="">-- Не выбрано --</option>
            {% for emp in emps %}
            <option value="{{ emp.id }}" {% if emp.id == act.commission_member3_id %}selected{% endif %}>
                {{ emp.last_name }} {{ emp.first_name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <!-- ДОБАВЛЕННЫЕ ОБЯЗАТЕЛЬНЫЕ ПОЛЯ -->
    <div>
        <label for="created_by_id">Кем создан:</label>
        <select id="created_by_id" name="created_by_id" required>
            <option value="">-- Выберите сотрудника --</option>
            {% for emp in emps %}
            <option value="{{ emp.id }}" {% if emp.id == act.created_by_id %}selected{% endif %}>
                {{ emp.last_name }} {{ emp.first_name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label for="department_id">Подразделение:</label>
        <select id="department_id" name="department_id" required>
            <option value="">-- Выберите подразделение --</option>
            {% for dept in depts %}
            <option value="{{ dept.id }}" {% if dept.id == act.department_id %}selected{% endif %}>
                {{ dept.name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <!-- Позиции списания -->
    <h3>Позиции списания</h3>
    <div id="items-container">
        {% if act.items %}
            {% for item in act.items %}
            <div class="item-row">
                <div>
                    <label>Товар:</label>
                    <select name="product_id" required>
                        <option value="">-- Выберите товар --</option>
                        {% for prod in prods %}
                        <option value="{{ prod.id }}" {% if prod.id == item.product_id %}selected{% endif %}>
                            {{ prod.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label>Инвентарный номер:</label>
                    <input type="text" name="inventory_number" value="{{ item.inventory_number }}" required>
                </div>
                
                <div>
                    <label>Дата ввода в эксплуатацию:</label>
                    <input type="date" name="commissioning_date" value="{{ item.commissioning_date }}">
                </div>
                
                <div>
                    <label>Первоначальная стоимость:</label>
                    <input type="number" step="0.01" name="initial_cost" value="{{ item.initial_cost }}">
                </div>
                
                <div>
                    <label>Срок полезного использования (мес):</label>
                    <input type="number" name="useful_life" value="{{ item.useful_life }}">
                </div>
                
                <div>
                    <label>Фактический срок службы (мес):</label>
                    <input type="number" name="actual_life" value="{{ item.actual_life }}">
                </div>
                
                <div>
                    <label>Остаточная стоимость:</label>
                    <input type="number" step="0.01" name="residual_value" value="{{ item.residual_value }}">
                </div>
                
                <div>
                    <label>Причина списания позиции:</label>
                    <textarea name="item_reason">{{ item.item_reason }}</textarea>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <p>Нет позиций для списания</p>
        {% endif %}
    </div>

    <br>
    <button type="submit" class="btn">Сохранить изменения</button>
    <a href="/writeoff-acts" class="btn">Отмена</a>
</form>

<style>
.item-row {
    border: 1px solid #ccc;
    padding: 15px;
    margin: 10px 0;
    border-radius: 5px;
    background: #f9f9f9;
}
.item-row > div {
    margin: 8px 0;
}
label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}
select, input, textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
}
.btn {
    display: inline-block;
    padding: 10px 20px;
    background: #007bff;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    margin-right: 10px;
}
.btn:hover {
    background: #0056b3;
}
</style>
{% endblock %}
