{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h4>Подтверждение удаления</h4>
        </div>
        <div class="card-body">
            <p>Вы уверены, что хотите удалить акт списания <strong>№{{ act.act_number }}</strong> от {{ act.act_date }}?</p>
            <p class="text-danger">Это действие нельзя отменить! Будут удалены все связанные позиции.</p>
            
            <form action="/writeoff-acts/{{ act.id }}/delete" method="post">
                <button type="submit" class="btn btn-danger">Да, удалить</button>
                <a href="/writeoff-acts" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
